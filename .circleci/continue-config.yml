version: 2.1

parameters:
  # These GitHub Actions params are expected by CircleCI even if unused.
  GHA_Actor:
    type: string
    default: ""
  GHA_Action:
    type: string
    default: ""
  GHA_Event:
    type: string
    default: ""
  GHA_Meta:
    type: string
    default: ""
  terraform_version:
    type: string
    default: 1.13.5
  run-polars-tests:
    type: boolean
    default: false
  run-pyspark-tests:
    type: boolean
    default: false

orbs:
  aws-cli: circleci/aws-cli@5.4.1

jobs:
  task-containerisation:
    parameters:
      aws_account_id:
        type: env_var_name
      access_key:
        type: env_var_name
      secret_key:
        type: env_var_name
    docker:
      - image: docker:latest
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - aws-cli/setup:
          region: $AWS_REGION
      - run:
          name: Build Docker Images
          command: |
            export AWS_ACCESS_KEY_ID=${<< parameters.access_key >>}
            export AWS_SECRET_ACCESS_KEY=${<< parameters.secret_key >>}
            # Authenticate Docker to ECR
            aws ecr get-login-password --region eu-west-2 | docker login -u AWS --password-stdin ${<< parameters.aws_account_id >>}.dkr.ecr.eu-west-2.amazonaws.com
            echo "Rebuilding lambdas and pushing to ECR."
            export AWS_ACCOUNT_ID=${<< parameters.aws_account_id >>}
            # This transformation should match the workspace_prefix set in terraform/pipeline/main.tf locals block
            export SANITISED_CIRCLE_BRANCH=$(echo ${CIRCLE_BRANCH:0:30} | tr -c '[:alnum:]\n' '-' | tr '[:upper:]' '[:lower:]')

            docker buildx bake all --push

  test:
    parameters:
      keyword:
        type: string
        default: ""
    docker:
      - image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
    resource_class: large
    environment:
      SPARK_VERSION: "3.5"       # Required for pydeequ to initialize
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1.2-uv-cache-{{ checksum "Pipfile.lock" }}
      - run:
          name: Install system packages
          command: |
            apt-get update
            apt-get install -y default-jre-headless
      - run:
          name: install dependencies
          command: uv pip install --system -r <(uvx pipenv requirements --dev)
      # Pre-cache the pyqeequ dependency so xdist works better.
      - run:
            name: Pre-cache Spark JARs
            command: python scripts/fetch_spark_dependencies.py
      - save_cache:
          key: v1.2-uv-cache-{{ checksum "Pipfile.lock" }}
          paths:
            - ~/.m2/repository
            - ~/.ivy2/jars
            - ~/.ivy2/cache
            - ~/.cache/uv
      - run:
          name: Run unit tests and generate coverage
          command: |
            pytest \
              -k "<< parameters.keyword >>" \
              -n auto --dist loadfile \
              --cov=. \
              --cov-report=xml \
              --cov-report=html
      - run:
            name: Output Coverage Report
            command: coverage report
      - store_artifacts:
          path: htmlcov

  lint-python:
    docker:
      - image: cimg/python:3.11.12
    resource_class: small
    steps:
      - checkout
      - run:
          name: Install black
          command: pip install black==25.1.0
      - run:
          name: Check Python formatting
          command: black . --check

  lint-docstrings:
    docker:
      - image: cimg/python:3.11.12
    resource_class: small
    steps:
      - checkout
      - run:
          name: Install pydoclint
          command: pip install pydoclint==0.6.10
      - run:
          name: Check docstring formatting
          command: pydoclint --style=google --quiet .

  lint-terraform:
    docker:
      - image: docker.mirror.hashicorp.services/hashicorp/terraform:<< pipeline.parameters.terraform_version >>
    resource_class: small
    steps:
      - checkout
      - run:
          name: Check terraform formatting
          command: terraform fmt -check -recursive -diff

  terraform-plan:
    parameters:
      aws_account:
        type: enum
        description: The short name of the AWS account, used to reference the relevant `tfbackend` file, and auth credentials
        enum: ["prod", "non_prod"]
      access_key:
        type: env_var_name
      secret_key:
        type: env_var_name
    working_directory: /tmp/project
    docker:
      - image: docker.mirror.hashicorp.services/hashicorp/terraform:<< pipeline.parameters.terraform_version >>
    resource_class: small
    steps:
      - checkout
      - run:
          name: terraform plan
          command: |
            # This transformation should match the workspace_prefix set in terraform/pipeline/main.tf locals block
            export SANITISED_CIRCLE_BRANCH=$(echo ${CIRCLE_BRANCH:0:30} | tr -c '[:alnum:]\n' '-' | tr '[:upper:]' '[:lower:]')
            export AWS_ACCESS_KEY_ID=${<< parameters.access_key >>}
            export AWS_SECRET_ACCESS_KEY=${<< parameters.secret_key >>}
            cd terraform/pipeline
            export AWS_ACCOUNT_ID=${AWS_ACCOUNT_ID_<< parameters.aws_account >>}
            terraform init -input=false -backend-config=../<< parameters.aws_account >>.s3.tfbackend
            terraform workspace select ${SANITISED_CIRCLE_BRANCH} || terraform workspace new ${SANITISED_CIRCLE_BRANCH}
            terraform plan -out tfapply
      - store_artifacts:
          path: terraform/pipeline/tfapply
      - persist_to_workspace:
          root: .
          paths:
            - terraform/pipeline/tfapply
            - terraform/pipeline/.*
            - .

  terraform-apply:
    parameters:
      aws_account:
        type: enum
        description: The short name of the AWS account, used to reference the relevant auth credentials
        enum: ["prod", "non_prod"]
      access_key:
        type: env_var_name
      secret_key:
        type: env_var_name
    docker:
      - image: docker.mirror.hashicorp.services/hashicorp/terraform:<< pipeline.parameters.terraform_version >>
    resource_class: small
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: terraform apply
          command: |
            export AWS_ACCESS_KEY_ID=${<< parameters.access_key >>}
            export AWS_SECRET_ACCESS_KEY=${<< parameters.secret_key >>}
            cd terraform/pipeline
            terraform apply -auto-approve tfapply
      - run:
          name: save pipeline resources bucket name
          command: |
            cd terraform/pipeline
            export AWS_ACCESS_KEY_ID=${<< parameters.access_key >>}
            export AWS_SECRET_ACCESS_KEY=${<< parameters.secret_key >>}
            echo $(terraform output --raw pipeline_resources_bucket_name) > pipeline_resources_bucket_name
      - run:
          name: save datasets bucket name
          command: |
            cd terraform/pipeline
            export AWS_ACCESS_KEY_ID=${<< parameters.access_key >>}
            export AWS_SECRET_ACCESS_KEY=${<< parameters.secret_key >>}
            echo $(terraform output --raw datasets_bucket_name) > datasets_bucket_name
      - persist_to_workspace:
          root: .
          paths:
            - ./terraform/pipeline/pipeline_resources_bucket_name
            - ./terraform/pipeline/datasets_bucket_name

  deploy-dependencies:
    parameters:
      access_key:
        type: env_var_name
      secret_key:
        type: env_var_name
    docker:
      - image: cimg/python:3.11.12
    resource_class: small
    steps:
      - attach_workspace:
          at: .
      - aws-cli/setup:
          region: $AWS_REGION
      - run:
          name: Setup Environment Variables
          command: |
            echo 'export AWS_ACCESS_KEY_ID="${<< parameters.access_key >>}"' >> "$BASH_ENV"
            echo 'export AWS_SECRET_ACCESS_KEY="${<< parameters.secret_key >>}"' >> "$BASH_ENV"
      - run:
          name: package utils, schemas, projects and environment
          command: |
            mkdir dependencies && zip -r dependencies/dependencies.zip utils schemas projects environment polars_utils
      - run:
          name: Download Deequ jar
          command: |
            wget https://repo1.maven.org/maven2/com/amazon/deequ/deequ/2.0.8-spark-3.5/deequ-2.0.8-spark-3.5.jar -O dependencies/deequ-2.0.8-spark-3.5.jar
      - run:
          name: Package PyDeequ
          command: |
            pip install -t ./target pydeequ==1.5.0
            cd target && zip -r pydeequ-1.5.0.zip pydeequ && cd ..
            mv target/pydeequ-1.5.0.zip dependencies/pydeequ-1.5.0.zip
            rm -rf target
      - run:
          name: Sync dependencies to S3
          command: |
            PIPELINE_RESOURCES=$(cat terraform/pipeline/pipeline_resources_bucket_name)
            aws s3 sync dependencies "s3://$PIPELINE_RESOURCES/dependencies"

  copy-main-data:
    docker:
      - image: cimg/base:current
    resource_class: small
    steps:
      - attach_workspace:
          at: .
      - aws-cli/setup:
          region: $AWS_REGION
      - run:
          name: Setup Environment Variables
          command: |
            echo 'export AWS_ACCESS_KEY_ID="${AWS_ACCESS_KEY_ID_non_prod}"' >> "$BASH_ENV"
            echo 'export AWS_SECRET_ACCESS_KEY="${AWS_SECRET_ACCESS_KEY_non_prod}"' >> "$BASH_ENV"
            echo 'export BRANCH_DATASET_BUCKET=$(cat terraform/pipeline/datasets_bucket_name)' >> "$BASH_ENV"
            echo 'export BRANCH_RESOURCES_BUCKET=$(cat terraform/pipeline/pipeline_resources_bucket_name)' >> "$BASH_ENV"
      - run:
          name: Copy main datasets to non-prod dataset bucket
          command: |
            aws s3 sync "s3://sfc-main-datasets/domain=CQC/dataset=delta_locations_api/version=3.1.0/" "s3://$BRANCH_DATASET_BUCKET/domain=CQC/dataset=delta_locations_api/version=3.1.0/"
            aws s3 sync "s3://sfc-main-datasets/domain=CQC/dataset=delta_providers_api/" "s3://$BRANCH_DATASET_BUCKET/domain=CQC/dataset=delta_providers_api/"
            aws s3 sync "s3://sfc-main-datasets/domain=CQC/dataset=cqc_locations_03_full_flattened/" "s3://$BRANCH_DATASET_BUCKET/domain=CQC/dataset=cqc_locations_03_full_flattened/"
            aws s3 sync "s3://sfc-main-datasets/domain=CQC/dataset=cqc_providers_03_full_flattened/" "s3://$BRANCH_DATASET_BUCKET/domain=CQC/dataset=cqc_providers_03_full_flattened/"
            aws s3 sync "s3://sfc-main-datasets/domain=CQC/dataset=cqc_locations_04_full_cleaned_registered/" "s3://$BRANCH_DATASET_BUCKET/domain=CQC/dataset=cqc_locations_04_full_cleaned_registered/"
            aws s3 sync "s3://sfc-main-datasets/domain=CQC/dataset=postcode_corrections/" "s3://$BRANCH_DATASET_BUCKET/domain=CQC/dataset=postcode_corrections/"
            aws s3 sync "s3://sfc-main-datasets/domain=ONS/dataset=postcode_directory_cleaned/" "s3://$BRANCH_DATASET_BUCKET/domain=ONS/dataset=postcode_directory_cleaned/"
            aws s3 sync "s3://sfc-main-datasets/domain=ASCWDS/dataset=workplace/" "s3://$BRANCH_DATASET_BUCKET/domain=ASCWDS/dataset=workplace/"
            aws s3 sync "s3://sfc-main-datasets/domain=ASCWDS/dataset=workplace_cleaned/" "s3://$BRANCH_DATASET_BUCKET/domain=ASCWDS/dataset=workplace_cleaned/"
            aws s3 sync "s3://sfc-main-datasets/domain=ASCWDS/dataset=worker/" "s3://$BRANCH_DATASET_BUCKET/domain=ASCWDS/dataset=worker/"
            aws s3 sync "s3://sfc-main-datasets/domain=ASCWDS/dataset=worker_cleaned/" "s3://$BRANCH_DATASET_BUCKET/domain=ASCWDS/dataset=worker_cleaned/"
            aws s3 sync "s3://sfc-main-datasets/domain=capacity_tracker/dataset=capacity_tracker_care_home_cleaned/" "s3://$BRANCH_DATASET_BUCKET/domain=capacity_tracker/dataset=capacity_tracker_care_home_cleaned/"
            aws s3 sync "s3://sfc-main-datasets/domain=capacity_tracker/dataset=capacity_tracker_non_residential_cleaned/" "s3://$BRANCH_DATASET_BUCKET/domain=capacity_tracker/dataset=capacity_tracker_non_residential_cleaned/"
            aws s3 sync "s3://sfc-main-datasets/domain=CQC/dataset=pir_cleaned/" "s3://$BRANCH_DATASET_BUCKET/domain=CQC/dataset=pir_cleaned/"
            aws s3 sync "s3://sfc-main-datasets/domain=ind_cqc_filled_posts/dataset=ind_cqc_06_estimated_filled_posts/" "s3://$BRANCH_DATASET_BUCKET/domain=ind_cqc_filled_posts/dataset=main_ind_cqc_06_estimated_filled_posts/"
      - run:
          name: Copy models to non-prod dataset
          command: |
            aws s3 sync "s3://sfc-main-pipeline-resources/models/" "s3://$BRANCH_RESOURCES_BUCKET/models/"

  terraform-destroy:
    working_directory: /tmp/project
    docker:
      - image: docker.mirror.hashicorp.services/hashicorp/terraform:<< pipeline.parameters.terraform_version >>
    resource_class: small
    steps:
      - checkout
      - aws-cli/setup:
          region: $AWS_REGION
      - run:
          name: terraform destroy
          command: |
            export AWS_ACCESS_KEY_ID="${AWS_ACCESS_KEY_ID_non_prod}"
            export AWS_SECRET_ACCESS_KEY="${AWS_SECRET_ACCESS_KEY_non_prod}"
            export CIRCLE_BRANCH="<< pipeline.parameters.GHA_Meta >>"
            export SANITISED_CIRCLE_BRANCH=$(echo ${CIRCLE_BRANCH:0:30} | tr -c "[:alnum:]\n" "-" | tr "[:upper:]" "[:lower:]")
            # --- Safeguard to never destroy main ---
            if [ "$SANITISED_CIRCLE_BRANCH" = "main" ]; then
              echo "Skipping destroy for main branch"
              exit 0
            fi
            # --- Select workspace ---
            cd terraform/pipeline
            terraform init -input=false -backend-config=../non_prod.s3.tfbackend
            terraform workspace select ${SANITISED_CIRCLE_BRANCH}
            # --- Force-empty dataset bucket for this branch ---
            echo "Emptying dataset bucket: s3://sfc-${SANITISED_CIRCLE_BRANCH}-datasets"
            NB_OBJECTS=$(aws s3api list-object-versions --bucket "sfc-${SANITISED_CIRCLE_BRANCH}-datasets" --query='length(Versions[*] || `[]` )' | awk '{ print $1 }')
            echo "      '${NB_OBJECTS}' objects to remove"
            if [[ "$NB_OBJECTS" != "0" ]]; then
              start=$SECONDS
              while [[ $NB_OBJECTS -gt 0 ]]
              do
                aws s3api delete-objects --bucket "sfc-${SANITISED_CIRCLE_BRANCH}-datasets" --delete "$(aws s3api list-object-versions --bucket "sfc-${SANITISED_CIRCLE_BRANCH}-datasets" --max-items 100 --query='{Objects: Versions[0:100].{Key:Key,VersionId:VersionId}}')" --query 'length(Deleted[*] || `[]` )' > /dev/null
                NB_OBJECTS=$((NB_OBJECTS  > 100 ? NB_OBJECTS - 100 : 0))
                echo "      Removed batch of Objects... Remaining : $NB_OBJECTS ($(( SECONDS - start ))s)"
              done
            fi

            NB_OBJECTS=$(aws s3api list-object-versions --bucket "sfc-${SANITISED_CIRCLE_BRANCH}-datasets" --query='length(DeleteMarkers[*] || `[]` )' | awk '{ print $1 }')
            echo "      '${NB_OBJECTS}' markers to remove"
            if [[ "$NB_OBJECTS" != "0" ]]; then
              start=$SECONDS
              while [[ $NB_OBJECTS -gt 0 ]]
              do
                aws s3api delete-objects --bucket "sfc-${SANITISED_CIRCLE_BRANCH}-datasets" --delete "$(aws s3api list-object-versions --bucket "sfc-${SANITISED_CIRCLE_BRANCH}-datasets" --max-items 100 --query='{Objects: DeleteMarkers[0:100].{Key:Key,VersionId:VersionId}}')" --query 'length(Deleted[*] || `[]` )' > /dev/null
                NB_OBJECTS=$((NB_OBJECTS  > 100 ? NB_OBJECTS - 100 : 0))
                echo "      Removed batch of Markers... Remaining : $NB_OBJECTS (took $(( SECONDS - start ))s)"
              done
            fi
            # --- Run destroy ---
            terraform destroy -auto-approve
      - run:
          name: delete workspace
          command: |
            export AWS_ACCESS_KEY_ID="${AWS_ACCESS_KEY_ID_non_prod}"
            export AWS_SECRET_ACCESS_KEY="${AWS_SECRET_ACCESS_KEY_non_prod}"
            cd terraform/pipeline
            terraform workspace select default
            export CIRCLE_BRANCH="<< pipeline.parameters.GHA_Meta >>"
            export SANITISED_CIRCLE_BRANCH=$(echo ${CIRCLE_BRANCH:0:30} | tr -c "[:alnum:]\n" "-" | tr "[:upper:]" "[:lower:]")
            terraform workspace delete ${SANITISED_CIRCLE_BRANCH}

aws_auth: &aws_auth
  access_key: AWS_ACCESS_KEY_ID
  secret_key: AWS_SECRET_ACCESS_KEY

aws_auth_non_prod: &aws_auth_non_prod
  access_key: AWS_ACCESS_KEY_ID_non_prod
  secret_key: AWS_SECRET_ACCESS_KEY_non_prod

deploy_sequence: &deploy_sequence
  - terraform-plan:
      <<: *aws_auth_non_prod
      aws_account: "non_prod"
      requires: [lint-terraform, task-containerisation]
  - terraform-apply:
      <<: *aws_auth_non_prod
      aws_account: "non_prod"
      requires: [terraform-plan]
  - deploy-dependencies:
      <<: *aws_auth_non_prod
      requires: [terraform-apply]
  - copy-main-data:
      requires: [terraform-apply]

workflows:
  test-plan-approve-and-deploy-to-main:
    when:
      equal: [ main, << pipeline.git.branch >> ]
    jobs:
      - test
      - task-containerisation:
          <<: *aws_auth
          aws_account_id: AWS_ACCOUNT_ID
      - terraform-plan:
          <<: *aws_auth
          aws_account: "prod"
          requires:
            - test
            - task-containerisation
      - plan-approval:
          type: approval
          requires:
            - terraform-plan
      - terraform-apply:
          <<: *aws_auth
          aws_account: "prod"
          requires:
            - plan-approval
      - deploy-dependencies:
          <<: *aws_auth
          requires:
            - terraform-apply

  test-plan-and-deploy-to-dev:
    when:
      and:
        - not: { equal: [ main, << pipeline.git.branch >> ] }
        - or: 
            - and:
                - not: << pipeline.parameters.run-pyspark-tests >>
                - not: << pipeline.parameters.run-polars-tests >>
            - and:
                - << pipeline.parameters.run-pyspark-tests >>
                - << pipeline.parameters.run-polars-tests >>
    jobs:
      - lint-python
      - lint-docstrings
      - lint-terraform
      - test
      - task-containerisation:
          <<: *aws_auth_non_prod
          aws_account_id: AWS_ACCOUNT_ID_non_prod
          requires: [lint-python, lint-docstrings, test]
          <<: *deploy_sequence

  polars-test-plan-and-deploy-to-dev:
    when:
      and:
        - not: { equal: [ main, << pipeline.git.branch >> ] }
        - << pipeline.parameters.run-polars-tests >>
        - not: << pipeline.parameters.run-pyspark-tests >>
    jobs:
      - lint-python
      - lint-docstrings
      - lint-terraform
      - test:
          name: polars-tests
          keyword: "fargate or polars"
      - task-containerisation:
          <<: *aws_auth_non_prod
          aws_account_id: AWS_ACCOUNT_ID_non_prod
          requires: [lint-python, lint-docstrings, polars-tests]
          <<: *deploy_sequence

  pyspark-test-plan-and-deploy-to-dev:
    when:
      and:
        - not: { equal: [ main, << pipeline.git.branch >> ] }
        - << pipeline.parameters.run-pyspark-tests >>
        - not: << pipeline.parameters.run-polars-tests >>
    jobs:
      - lint-python
      - lint-docstrings
      - lint-terraform
      - test:
          name: pyspark-tests
          keyword: "jobs"
      - task-containerisation:
          <<: *aws_auth_non_prod
          aws_account_id: AWS_ACCOUNT_ID_non_prod
          requires: [lint-python, lint-docstrings, pyspark-tests]
          <<: *deploy_sequence

  delete-development-environment:
    when: << pipeline.parameters.GHA_Action >>
    jobs:
      - terraform-destroy
